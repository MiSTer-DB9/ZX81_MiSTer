name: Push Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
  repository_dispatch:
    types: [push_release]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: false   # this is too slow, just skip
        docker-images: true
        swap-storage: true

    - uses: actions/checkout@v6

    - name: Cache Docker image
      uses: actions/cache@v5
      with:
        path: /tmp/docker-image.tar
        key: docker-theypsilon/quartus-lite-c5:17.0.2.docker0

    - name: Release
      run: ./.github/push_release.sh theypsilon@gmail.com neurorulez@gmail.com timothy.redaelli@gmail.com
      env:
        NOTIFICATION_API_KEY: ${{ secrets.NOTIFICATION_API_KEY }}
        FORCED: ${{ github.event.client_payload.forced }}
