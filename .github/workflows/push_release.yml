name: Push Release

on:
  push:
    branches:
      - master
  repository_dispatch:
    types: [push_release]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Cache Docker image
      uses: actions/cache@v4
      with:
        path: /tmp/docker-image.tar
        key: docker-theypsilon/quartus-lite-c5:17.0.2.docker0

    - name: Load or pull Docker image
      run: |
        if [ -f /tmp/docker-image.tar ]; then
          docker load -i /tmp/docker-image.tar
        else
          docker pull "theypsilon/quartus-lite-c5:17.0.2.docker0"
          docker save "theypsilon/quartus-lite-c5:17.0.2.docker0" -o /tmp/docker-image.tar
        fi

    - name: Release
      run: ./.github/push_release.sh theypsilon@gmail.com neurorulez@gmail.com timothy.redaelli@gmail.com
      env:
        NOTIFICATION_API_KEY: ${{ secrets.NOTIFICATION_API_KEY }}
        FORCED: ${{ github.event.client_payload.forced }}
